<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About - LEGWRK NYC</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html {
      overflow-y: scroll;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: #fafafa;
      color: #333333;
      min-height: 100vh;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .app-container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
      overflow-x: hidden;
    }
    
    @media (max-width: 1024px) {
      .app-container { padding: 4rem 2rem; }
    }
    
    @media (max-width: 768px) {
      .app-container { padding: 2rem 1.5rem; }
    }

    /* Cloned native header logic rendering the identical menu mapping */
    .app-header {
      margin-bottom: 15rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .site-title {
      font-size: 0.96rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #333333;
      margin: 0;
    }
    .header-nav {
      display: flex;
      gap: 24px;
      opacity: 0;
      animation: fadeInNav 1.2s ease-in forwards;
      animation-delay: 0.2s;
    }
    .nav-link {
      font-size: 0.9rem;
      font-weight: 500;
      color: #000000;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }
    .nav-link:hover {
      opacity: 0.5;
    }

    /* Core Page Formatting */
    .about-container {
      max-width: 900px;
      padding-left: 0;
      opacity: 0;
      animation: fadeIn 1.2s ease-in forwards;
    }
    h1.hero-statement {
      color: #333333;
      font-size: clamp(0.9rem, 1.98vw, 1.62rem); /* Reduced mathematically by exactly 70% */
      font-weight: 300;
      line-height: 1.4;
      margin: 0;
      letter-spacing: 0em;
      text-align: left;
      max-width: 50ch;
    }
    .pale-blue {
      color: #8cb4d6;
    }

    @keyframes fadeInNav {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <a href="https://legwrk.com" style="text-decoration: none;">
        <h1 class="site-title">LEGWRK NYC</h1>
      </a>
      <nav class="header-nav">
        <a href="https://legwrk.com/submit" class="nav-link">Submit</a>
        <a href="https://legwrk.com/about" class="nav-link">About</a>
      </nav>
    </header>

    <div class="about-container">
      <h1 class="hero-statement">LEGWRK is an ongoing project by Ryan Collier currently showcasing <span id="studio-count" class="pale-blue">*</span> studios and creative agencies in New York City. If you would like to have your studio/agency featured please feel free to reach out to ryanhcollier at gmail dot com.</h1>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1U60AENQujuIeKnW_qtsH2BCL9UFjoHqOtr4aGZBDFWA/export?format=csv';

    async function fetchStudioCount() {
      try {
        const response = await fetch(SHEET_CSV_URL);
        const csvText = await response.text();
        
        Papa.parse(csvText, {
          header: false,
          skipEmptyLines: true,
          complete: function(results) {
            let count = 0;
            results.data.forEach(row => {
              const name = row[0];
              const url = row[1];
              if (name && url && name !== 'Studio Name' && name !== 'Studio' && name !== 'Name') {
                count++;
              }
            });
            document.getElementById('studio-count').innerText = count;
          }
        });
      } catch (err) {
        console.error("Failed to fetch studio count:", err);
      }
    }

    fetchStudioCount();
  </script>
</body>
</html>
