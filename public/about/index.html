<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About - LEGWRK NYC</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #fafafa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .about-container {
      max-width: 900px;
      padding: 2rem;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.2s ease-in forwards;
    }
    h1 {
      color: #333333;
      font-size: clamp(2.5rem, 5.5vw, 4.5rem);
      font-weight: 400;
      line-height: 1.1;
      margin: 0;
      letter-spacing: -0.01em;
    }
    .back-link {
      display: inline-block;
      margin-top: 4rem;
      color: #000000;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      border: 1px solid #000000;
      padding: 10px 24px;
      border-radius: 6px;
      transition: all 0.3s;
    }
    .back-link:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="about-container">
    <h1>LEGWRK is a personal project created by Ryan Collier as a running list of New York City creative studios.</h1>
    <a href="/" class="back-link">Return to Directory</a>
  </div>
</body>
</html>
